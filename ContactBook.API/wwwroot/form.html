<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContactBook — Add Contact</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <span>ContactBook</span>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          All Contacts
        </a>
        <a href="index.html?filter=favorites" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          Favorites
        </a>
        <a href="form.html" class="nav-item nav-item--add active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          Add Contact
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="index.html" class="btn btn-ghost btn-full">← Back to Contacts</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="formTitle">Add New Contact</h1>
          <p class="page-subtitle" id="formSubtitle">Fill in the details below to create a new contact.</p>
        </div>
      </header>

      <div class="form-container">
        <form id="contactForm" novalidate>
          <!-- Avatar Preview -->
          <div class="avatar-preview-wrap">
            <div class="avatar-preview" id="avatarPreview">
              <span id="avatarInitials">?</span>
            </div>
            <div class="avatar-info">
              <p class="avatar-hint">Avatar is auto-generated from name initials</p>
            </div>
          </div>

          <!-- Form Sections -->
          <div class="form-sections">

            <!-- Basic Info -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-num">01</span>
                Basic Information
              </h3>
              <div class="form-row">
                <div class="form-group">
                  <label for="firstName" class="form-label">First Name <span class="required">*</span></label>
                  <input type="text" id="firstName" name="firstName" class="form-input" placeholder="e.g. John" maxlength="50" />
                  <span class="form-error" id="firstNameError"></span>
                </div>
                <div class="form-group">
                  <label for="lastName" class="form-label">Last Name <span class="required">*</span></label>
                  <input type="text" id="lastName" name="lastName" class="form-input" placeholder="e.g. Doe" maxlength="50" />
                  <span class="form-error" id="lastNameError"></span>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="category" class="form-label">Category</label>
                  <select id="category" name="category" class="form-input form-select">
                    <option value="Personal">Personal</option>
                    <option value="Work">Work</option>
                    <option value="Family">Family</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="form-group form-group--checkbox">
                  <label class="checkbox-label">
                    <input type="checkbox" id="isFavorite" name="isFavorite" class="checkbox-input" />
                    <span class="checkbox-custom">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    </span>
                    <span class="checkbox-text">Mark as Favorite ⭐</span>
                  </label>
                </div>
              </div>
            </section>

            <!-- Contact Info -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-num">02</span>
                Contact Details
              </h3>
              <div class="form-row">
                <div class="form-group">
                  <label for="email" class="form-label">Email Address <span class="required">*</span></label>
                  <input type="email" id="email" name="email" class="form-input" placeholder="john@example.com" />
                  <span class="form-error" id="emailError"></span>
                </div>
                <div class="form-group">
                  <label for="phone" class="form-label">Phone Number <span class="required">*</span></label>
                  <input type="tel" id="phone" name="phone" class="form-input" placeholder="+92 300 1234567" />
                  <span class="form-error" id="phoneError"></span>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="company" class="form-label">Company / Organization</label>
                  <input type="text" id="company" name="company" class="form-input" placeholder="e.g. Acme Corp" />
                </div>
                <div class="form-group">
                  <label for="address" class="form-label">Address</label>
                  <input type="text" id="address" name="address" class="form-input" placeholder="123 Main Street, City" />
                </div>
              </div>
            </section>

            <!-- Notes -->
            <section class="form-section">
              <h3 class="section-title">
                <span class="section-num">03</span>
                Additional Notes
              </h3>
              <div class="form-group">
                <label for="notes" class="form-label">Notes</label>
                <textarea id="notes" name="notes" class="form-input form-textarea" placeholder="Any additional information about this contact…" rows="4"></textarea>
              </div>
            </section>

          </div><!-- /form-sections -->

          <!-- Form Actions -->
          <div class="form-actions">
            <a href="index.html" class="btn btn-ghost">Cancel</a>
            <button type="button" class="btn btn-ghost" id="resetBtn">Reset Form</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span id="submitText">Save Contact</span>
              <div class="btn-spinner" id="btnSpinner" style="display:none"></div>
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
